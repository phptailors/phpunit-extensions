name: Static Analysis

on:
  - pull_request
  - push

jobs:
  type-checker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.3"
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
        dependencies:
          - lowest
          - highest

    name: Psalm (PHP-${{ matrix.php-version }}:${{ matrix.dependencies }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - if: matrix.dependencies == 'highest'
        run: composer update --no-interaction --no-progress --ansi --with="sebastian/recursion-context:^4"

      - if: matrix.dependencies == 'lowest'
        run: composer update --no-interaction --no-progress --ansi --prefer-lowest

      - name: Install psalm with composer
        run: composer bin psalm update --no-interaction --ansi --no-progress

      - name: Run vimeo/psalm on packages
        run: bin/psalm --php-version=${{ matrix.php-version }} --no-progress --shepherd --show-info=true --stats
